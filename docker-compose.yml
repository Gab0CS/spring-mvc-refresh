services:
  db:
    image: postgres:15.2
    container_name: martegroup_db
    restart: always
    environment:
      - POSTGRES_DB=martegroup
      - POSTGRES_USER=marte
      - POSTGRES_PASSWORD=secret
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: